plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nongmol.agent.v2'
    compileSdk 34

    defaultConfig {
        applicationId "com.nongmol.agent.v2"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "3.0"
        externalNativeBuild {
            cmake { cppFlags "-std=c++17" }
        }
    }
    externalNativeBuild {
        cmake { path "src/main/cpp/CMakeLists.txt" }
    }
}
