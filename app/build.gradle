plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nongmol.agent.v2'
    compileSdk 33

    defaultConfig {
        applicationId "com.nongmol.agent.v2"
        minSdk 24
        targetSdk 33
        versionCode 6
        versionName "6.1"
        externalNativeBuild {
            cmake { cppFlags "" }
        }
    }

    externalNativeBuild {
        cmake { path "src/main/cpp/CMakeLists.txt" }
    }
}
