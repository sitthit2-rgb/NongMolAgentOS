<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .bot { align-self: flex-start; background: #e9e9eb; color: #333; }
        #input-area { background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">NongMol Agent OS v2</div>
    <div id="chat-box" id="chatBox">
        <div class="msg bot">สวัสดีค่ะพี่ มีอะไรให้น้องมลช่วยไหมคะ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="พิมพ์ข้อความที่นี่...">
        <button onclick="sendMessage()">ส่ง</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if (input.value.trim() === '') return;

            // 1. แสดงข้อความฝั่ง User
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = input.value;
            chatBox.appendChild(userDiv);

            // 2. ส่งข้อมูลไปที่ Java Bridge (Android)
            if (window.NongMolBridge) {
                window.NongMolBridge.postToAI(input.value);
            }

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ฟังก์ชันที่ Java จะเรียกกลับมาเพื่อแสดงคำตอบจาก AI
        function updateBotResponse(answer) {
            const chatBox = document.getElementById('chat-box');
            const botDiv = document.createElement('div');
            botDiv.className = 'msg bot';
            botDiv.innerText = answer;
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
