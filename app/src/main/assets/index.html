<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #34495e; color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; word-wrap: break-word; font-size: 16px; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #input-area { background: white; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #eee; align-items: center; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #2ecc71; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">NongMol Agent OS v2</div>
    <div id="chat-box">
        <div class="msg bot">สวัสดีค่ะพี่ มีอะไรให้น้องมลช่วยไหมคะ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="พิมพ์คุยกับน้องมล..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ส่ง</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            if (text === '') return;

            addMessage(text, 'user');
            if (window.NongMolBridge) {
                window.NongMolBridge.postToAI(text);
            }
            input.value = '';
        }

        function addMessage(text, side) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg ' + side;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateBotResponse(answer) {
            addMessage(answer, 'bot');
        }
    </script>
</body>
</html>
