- name: Force Bundle All Native Libs
        run: |
          # ล้างของเก่าทิ้งก่อน
          rm -rf app/src/main/jniLibs
          mkdir -p app/src/main/jniLibs/arm64-v8a
          
          # กวาดไฟล์ .so ทุกที่มาลงที่นี่ และแสดงรายชื่อออกมาดูใน Log ด้วย
          find . -name "*.so" -exec cp -v {} app/src/main/jniLibs/arm64-v8a/ \;
          
          # ตรวจสอบว่าใน jniLibs มีไฟล์อะไรบ้าง (ดูในหน้า Actions ตอนรัน)
          ls -R app/src/main/jniLibs/

      - name: Build and Keep Libs Uncompressed
        run: |
          # บังคับให้ Android ไม่บีบอัดไฟล์ .so (ลดอาการเด้งได้ชะงัด)
          echo "android.bundle.enableUncompressedNativeLibs=false" >> gradle.properties
          ./gradlew assembleDebug --stacktrace
