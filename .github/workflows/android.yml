- name: จัดเตรียมไฟล์ Library
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          find . -name "*.so" -exec cp {} app/src/main/jniLibs/arm64-v8a/ \;

      - name: สร้างด้วย Gradle
        run: ./gradlew assembleDebug

      - name: อัปโหลด APK
        uses: actions/upload-artifact@v4
        with:
          name: NongMol-Final-App
          path: app/build/outputs/apk/debug/app-debug.apk
